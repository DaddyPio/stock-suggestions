name: Daily Stock Buzz

on:
  schedule:
    # 06:30 台灣時間 = 22:30 UTC（前一天）。台股交易日週一~週五 → UTC 週日~週四。
    - cron: "30 22 * * 0-4"
  workflow_dispatch:
    inputs:
      lookback:
        description: "抓最近幾天內容"
        default: "1"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # 含 podcast 語音轉錄（faster-whisper CPU）
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-${{ hashFiles('config/sources.yml') }}
          restore-keys: whisper-

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
        run: |
          python -m app.main --lookback "${{ github.event.inputs.lookback || '1' }}" run

      - name: Commit history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/*.json data/history/*.html || true
          git commit -m "data: 每日輿情排名 $(date -u +%Y-%m-%d)" || echo "無變更"
          git push || echo "無可推送"
